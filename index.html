<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КИБЕРПАНК БЛОКЧЕЙН МОНИТОР</title>
    <script type="text/javascript" nonce="2c18a4d3f88a4df781af4ea6aa4" src="//local.adguard.org?ts=1769447314704&amp;type=content-script&amp;dmn=cdn.discordapp.com&amp;url=https%3A%2F%2Fcdn.discordapp.com%2Fattachments%2F1239954705115774998%2F1465396718194528509%2Fdeepseek_html_20260126_d423e0.html%3Fex%3D6978f48b%26is%3D6977a30b%26hm%3D1ce242754f4c1075840d39f1603ff67978161cd5b8401f15bb4f7ce5d4fde9e0%26&amp;app=browser.exe&amp;css=3&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1&amp;stealth=1&amp;st-dnt"></script><script type="text/javascript" nonce="2c18a4d3f88a4df781af4ea6aa4" src="//local.adguard.org?ts=1769447314704&amp;name=AdGuard%20Extra&amp;name=AdGuard%20Popup%20Blocker&amp;type=user-script"></script><link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Анимированный фон -->
    <div class="cyber-background">
        <div class="grid-lines"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="particles" id="particles-container"></div>
        <div class="data-stream" id="data-stream"></div>
    </div>
    
    <div class="scanline"></div>
    
    <div class="container">
        <header>
            <h1 class="glitch" data-text="ETHEREUM BLOCKCHAIN MONITOR">ETHEREUM BLOCKCHAIN MONITOR</h1>
            <p class="subtitle">РЕАЛЬНОЕ ВРЕМЯ • КИБЕРПРОСТРАНСТВО • ДЕЦЕНТРАЛИЗАЦИЯ</p>
        </header>
        
        <div class="dashboard">
            <div class="stats-panel">
                <div class="status-bar">
                    <div class="status-item">
                        <span class="pulse"></span>
                        <span id="status-text">ПОДКЛЮЧЕНИЕ К СЕТИ ETHEREUM...</span>
                    </div>
                    <div class="status-item">
                        <span>СИСТЕМА: <span id="system-status">АКТИВНА</span></span>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <h3>ТЕКУЩИЙ БЛОК</h3>
                        <div class="stat-value" id="current-block">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>ВСЕГО ТРАНЗАКЦИЙ</h3>
                        <div class="stat-value" id="total-transactions">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>СРЕДНЯЯ КОМИССИЯ</h3>
                        <div class="stat-value" id="avg-fee">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>ПОСЛЕДНЕЕ ОБНОВЛЕНИЕ</h3>
                        <div class="stat-value" id="update-time">-</div>
                    </div>
                </div>
            </div>
            
            <div class="cube-section">
                <div class="cube-container-wrapper">
                    <div class="cube-container" id="cube-container">
                        <!-- Грани куба будут сгенерированы через JavaScript -->
                    </div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="cyber-button" id="pause-btn">ПАУЗА</button>
            <button class="cyber-button" id="glitch-btn">ГЛИТЧ</button>
        </div>
    </div>

    <script src="js/cube-3d.js"></script>
    <script src="js/blockchain-simulator.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
